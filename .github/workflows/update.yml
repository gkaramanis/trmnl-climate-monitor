name: Update climate data

on:
  schedule:
    # 05:20 UTC daily — after Open-Meteo's overnight archive refresh
    - cron: "20 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data.json
        # Config (location, units, normal window) lives at the top of
        # build_data.py — that's the single source of truth. Override per-run
        # locally with env vars if needed, e.g. LAT=51.5 python3 build_data.py.
        run: python build_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update climate data $(date -u +%F)"
          git push
