name: Update climate data

on:
  schedule:
    # 05:20 UTC daily — after Open-Meteo's overnight archive refresh
    - cron: "20 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build data.json
        env:
          # Edit these, or set them as repository Variables (Settings → Secrets
          # and variables → Actions → Variables) and reference ${{ vars.LAT }}.
          LAT: "59.8586"
          LON: "17.6389"
          LOCATION: "Uppsala"
          UNITS: "celsius"        # or "fahrenheit"
          NORMAL_FROM: "1961"
          NORMAL_TO: "1990"
        run: python build_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update climate data $(date -u +%F)"
          git push
